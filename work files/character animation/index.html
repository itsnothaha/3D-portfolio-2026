<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Character Animation — Marakova Daria</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Darumadrop+One&family=Julius+Sans+One&display=swap" rel="stylesheet">
  <style>
    :root{--panel:#202020;--line:#f0eee6;--text:#f0eee6;--violet:#7770ad;--header:52px}
    *{box-sizing:border-box}
    html{scroll-behavior:smooth;background:var(--panel)}
    body{margin:0;min-height:100vh;color:var(--text);font-family:'Julius Sans One',system-ui,sans-serif;background:var(--panel);overflow-x:hidden;cursor:none}
    a,button,[role="button"],video{cursor:none}
    a{color:inherit;text-decoration:none}
    .page-head{position:fixed;inset:0 0 auto 0;min-height:var(--header);z-index:20;display:flex;align-items:center;padding:9px clamp(14px,2.2vw,30px);pointer-events:none}
    .brand{pointer-events:auto;font-family:'Darumadrop One',cursive;color:var(--violet);font-size:clamp(14px,1.3vw,18px);line-height:1;text-shadow:0 1px 0 rgba(255,255,255,.35);transition:transform .25s ease,filter .25s ease}
    .brand:hover{transform:translateY(-2px);filter:drop-shadow(0 0 8px rgba(119,112,173,.5))}
    main{width:min(100%,900px);margin:clamp(54px,7vh,74px) auto clamp(34px,6vh,70px);padding:clamp(38px,4.8vw,86px) clamp(22px,3vw,44px) clamp(42px,6vw,84px)}
    .video-group{margin:0 0 clamp(46px,7vw,76px)}
    .video-group h1,.video-group h2{margin:0 0 10px 12px;font-family:'Darumadrop One',cursive;color:var(--text);font-size:clamp(38px,6vw,70px);line-height:.88;text-transform:uppercase;letter-spacing:.03em}
    .frame{border:3px solid var(--line);border-radius:24px;padding:24px 26px;background:rgba(255,255,255,.01)}
    .frame-scroll{overflow-x:auto;overflow-y:hidden;scrollbar-width:thin;scrollbar-color:rgba(240,238,230,.55) transparent;overscroll-behavior-inline:contain;-webkit-overflow-scrolling:touch}
    .frame-scroll::-webkit-scrollbar{height:8px}
    .frame-scroll::-webkit-scrollbar-thumb{background:rgba(240,238,230,.48);border-radius:999px}
    .video-row{display:flex;gap:29px;width:max-content;min-width:100%;align-items:center}
    .video-card,.feature-card{border:2px solid rgba(240,238,230,.82);border-radius:22px;overflow:hidden;padding:0;background:#2b2b2b;cursor:none;box-shadow:0 15px 24px rgba(0,0,0,.25);transition:transform .25s ease,filter .25s ease,border-color .25s ease}
    .video-card:hover,.feature-card:hover{transform:translateY(-6px) rotate(-1deg);filter:brightness(1.06) saturate(1.05);border-color:#fff}
    .video-card{width:clamp(134px,18vw,192px);aspect-ratio:9/16;flex:0 0 auto}
    .feature-card{width:min(100%,760px);aspect-ratio:16/9;display:block;margin-inline:auto}
    .video-card img,.feature-card img{width:100%;height:100%;display:block;object-fit:cover;pointer-events:none;background:#000}
    .modal{position:fixed;inset:0;z-index:50;display:grid;place-items:center;padding:clamp(18px,4vw,54px);background:rgba(0,0,0,.78);opacity:0;pointer-events:none;transition:opacity .22s ease}
    .modal.is-open{opacity:1;pointer-events:auto}
    .modal-inner{width:fit-content;max-width:min(92vw,980px);max-height:88vh;display:grid;place-items:center}
    .modal video{display:block;width:auto;height:auto;max-width:min(92vw,980px);max-height:88vh;background:#000;border:3px solid var(--line);border-radius:24px;box-shadow:0 30px 90px rgba(0,0,0,.55)}
    #starCanvas{position:fixed;inset:0;width:100%;height:100%;z-index:100;pointer-events:none}
    .cursor,.cursor-dot{position:fixed;left:0;top:0;z-index:101;pointer-events:none}
    .cursor{width:34px;height:50px;transform:translate(-50%,-42%);transform-origin:50% 42%;background:none;filter:drop-shadow(0 0 8px rgba(255,255,255,.92)) drop-shadow(0 0 18px rgba(128,143,255,.78)) drop-shadow(0 0 36px rgba(58,68,170,.66));transition:transform .16s ease,opacity .16s ease,filter .16s ease}
    .cursor::before,.cursor::after{content:"";position:absolute}
    .cursor::before{inset:-11px;border-radius:50%;background:radial-gradient(circle,rgba(255,255,255,.46) 0 10%,rgba(133,150,255,.34) 28%,rgba(62,76,178,.24) 48%,transparent 72%);filter:blur(3px)}
    .cursor::after{inset:0;clip-path:polygon(50% 0,56% 35%,100% 42%,57% 50%,50% 100%,43% 50%,0 42%,44% 35%);background:radial-gradient(circle at 50% 42%,#fff 0 28%,#fff8f3 38%,#dfe6ff 54%,#8f9be9 74%,#29336f 100%)}
    .cursor-dot{z-index:102;width:18px;height:26px;transform:translate(-50%,-42%) rotate(45deg);transform-origin:50% 42%;clip-path:polygon(50% 0,56% 35%,100% 42%,57% 50%,50% 100%,43% 50%,0 42%,44% 35%);background:radial-gradient(circle at 50% 42%,#fff 0 30%,#fff7f0 42%,#dfe6ff 63%,#8c9bea 100%);filter:drop-shadow(0 0 7px rgba(255,255,255,.82)) drop-shadow(0 0 16px rgba(128,143,255,.55));transition:transform .16s ease,opacity .16s ease,filter .16s ease}
    body.cursor-big .cursor{transform:translate(-50%,-42%) scale(1.12);filter:drop-shadow(0 0 10px rgba(255,255,255,.96)) drop-shadow(0 0 24px rgba(128,143,255,.86)) drop-shadow(0 0 46px rgba(58,68,170,.74))}
    body.cursor-big .cursor-dot{transform:translate(-50%,-42%) rotate(45deg) scale(1.12);opacity:1}
    @media (max-width:760px){
      :root{--header:58px}
      body{cursor:auto}
      #starCanvas,.cursor,.cursor-dot{display:none}
      .page-head{position:sticky;background:rgba(32,32,32,.88);backdrop-filter:blur(10px)}
      main{width:min(100% - 24px,744px);margin:14px auto 28px;padding:34px 14px 42px}
      .video-group h1,.video-group h2{font-size:clamp(33px,10.8vw,46px);margin-left:10px}
      .frame{border-width:2px;border-radius:22px;padding:19px}
      .video-row{gap:19px}
      .video-card{width:clamp(134px,45vw,180px);border-radius:20px}
      .feature-card{border-radius:20px}
      .modal{padding:14px}
      .modal video{border-radius:18px}
    }
  </style>
</head>
<body>
  <canvas id="starCanvas" aria-hidden="true"></canvas>
  <div class="cursor" aria-hidden="true"></div>
  <div class="cursor-dot" aria-hidden="true"></div>
  <header class="page-head">
    <a class="brand magnetic" href="../../index.html#work">Marakova Daria 3d artist</a>
  </header>
  <main aria-label="Character animation portfolio videos">
    <section class="video-group" aria-labelledby="personal-project">
      <h1 id="personal-project">PERSONAL PROJECT</h1>
      <div class="frame">
        <button class="feature-card magnetic" type="button" data-video="renderfull.mp4" aria-label="Open video renderfull">
          <img src="renderfull.png" alt="renderfull preview" loading="eager" />
        </button>
      </div>
    </section>
    <section class="video-group" aria-labelledby="bushe-bakery">
      <h2 id="bushe-bakery">BUSHE BAKERY</h2>
      <div class="frame frame-scroll" tabindex="0" aria-label="Bushe Bakery horizontal video previews">
        <div class="video-row">
          <button class="video-card magnetic" type="button" data-video="Gym animation.mp4" aria-label="Open video Gym animation"><img src="gym animation.png" alt="Gym animation preview" loading="lazy" /></button>
          <button class="video-card magnetic" type="button" data-video="beauty shop animation.mp4" aria-label="Open video beauty shop animation"><img src="beauty shop animation.png" alt="beauty shop animation preview" loading="lazy" /></button>
          <button class="video-card magnetic" type="button" data-video="construction animation.mp4" aria-label="Open video construction animation"><img src="construction animation.png" alt="construction animation preview" loading="lazy" /></button>
          <button class="video-card magnetic" type="button" data-video="tartalet.mp4" aria-label="Open video tartalet"><img src="tartalet.png" alt="tartalet preview" loading="lazy" /></button>
        </div>
      </div>
    </section>
    <section class="video-group" aria-labelledby="other">
      <h2 id="other">OTHER</h2>
      <div class="frame">
        <button class="feature-card magnetic" type="button" data-video="easter.mov" aria-label="Open video easter">
          <img src="easter.png" alt="easter preview" loading="lazy" />
        </button>
      </div>
    </section>
  </main>
  <div class="modal" id="videoModal" aria-hidden="true" role="dialog" aria-label="Video player">
    <div class="modal-inner"><video id="modalVideo" controls playsinline preload="metadata"></video></div>
  </div>
  <script>
    const modal=document.querySelector('#videoModal');
    const modalVideo=document.querySelector('#modalVideo');
    function openVideo(src){if(!modal||!modalVideo)return;modalVideo.src=src;modal.classList.add('is-open');modal.setAttribute('aria-hidden','false');document.body.style.overflow='hidden';modalVideo.play().catch(()=>{});}
    function closeVideo(){if(!modal||!modalVideo)return;modal.classList.remove('is-open');modal.setAttribute('aria-hidden','true');modalVideo.pause();modalVideo.removeAttribute('src');modalVideo.load();document.body.style.overflow='';}
    document.querySelectorAll('.video-card,.feature-card').forEach(card=>{card.addEventListener('click',()=>openVideo(card.dataset.video));});
    modalVideo?.addEventListener('click',event=>event.stopPropagation());
    modal?.addEventListener('click',event=>{if(!event.target.closest('video'))closeVideo();});
    document.addEventListener('keydown',event=>{if(event.key==='Escape')closeVideo();});
    const cursor=document.querySelector('.cursor'),dot=document.querySelector('.cursor-dot'),canvas=document.querySelector('#starCanvas'),ctx=canvas?.getContext('2d'),reduceMotion=window.matchMedia('(prefers-reduced-motion: reduce)').matches,finePointer=window.matchMedia('(pointer: fine)').matches;
    let x=innerWidth/2,y=innerHeight/2,cx=x,cy=y,lastX=x,lastY=y,stars=[];
    function resizeCanvas(){if(!canvas||!ctx)return;const ratio=Math.min(window.devicePixelRatio||1,2);canvas.width=Math.floor(innerWidth*ratio);canvas.height=Math.floor(innerHeight*ratio);canvas.style.width=`${innerWidth}px`;canvas.style.height=`${innerHeight}px`;ctx.setTransform(ratio,0,0,ratio,0,0);}
    function addStar(px,py,force=1){if(!finePointer||reduceMotion)return;stars.push({x:px,y:py,size:(Math.random()*5+3)*force,vx:(Math.random()-.5)*1.8,vy:(Math.random()-.5)*1.8-.35,rotation:Math.random()*Math.PI,spin:(Math.random()-.5)*.12,life:1,decay:Math.random()*.015+.015,points:Math.random()>.55?4:5});if(stars.length>120)stars.splice(0,stars.length-120);}
    function drawStar(star){if(!ctx)return;ctx.save();ctx.translate(star.x,star.y);ctx.rotate(star.rotation);ctx.beginPath();const outer=star.size,inner=star.size*.42,steps=star.points*2;for(let i=0;i<=steps;i++){const radius=i%2===0?outer:inner,angle=(Math.PI*2*i/steps)-Math.PI/2,px=Math.cos(angle)*radius,py=Math.sin(angle)*radius;if(i===0)ctx.moveTo(px,py);else ctx.lineTo(px,py);}ctx.closePath();ctx.fillStyle=`rgba(244,244,244,${.70*star.life})`;ctx.shadowColor=`rgba(244,244,244,${.65*star.life})`;ctx.shadowBlur=10;ctx.fill();ctx.restore();}
    function animateCursor(){if(cursor){cursor.style.left=`${x}px`;cursor.style.top=`${y}px`;}if(dot){dot.style.left=`${x}px`;dot.style.top=`${y}px`;}if(ctx){ctx.clearRect(0,0,innerWidth,innerHeight);stars.forEach(star=>{star.x+=star.vx;star.y+=star.vy;star.rotation+=star.spin;star.life-=star.decay;star.size+=.015;drawStar(star);});stars=stars.filter(star=>star.life>0);}requestAnimationFrame(animateCursor);}
    if(canvas&&ctx&&finePointer&&!reduceMotion){resizeCanvas();addEventListener('resize',resizeCanvas);window.addEventListener('mousemove',event=>{x=event.clientX;y=event.clientY;if(dot){dot.style.left=`${x}px`;dot.style.top=`${y}px`;}const distance=Math.hypot(x-lastX,y-lastY);if(distance>10){for(let i=0;i<Math.min(4,Math.floor(distance/22)+1);i++)addStar(x+(Math.random()-.5)*18,y+(Math.random()-.5)*18,Math.min(1.5,distance/80));lastX=x;lastY=y;}});animateCursor();}
    document.querySelectorAll('a,button,.video-card,.feature-card').forEach(el=>{el.addEventListener('mouseenter',()=>{document.body.classList.add('cursor-big');for(let i=0;i<10;i++)addStar(x+(Math.random()-.5)*34,y+(Math.random()-.5)*34,1.2);});el.addEventListener('mouseleave',()=>document.body.classList.remove('cursor-big'));el.addEventListener('click',()=>{for(let i=0;i<20;i++)addStar(x+(Math.random()-.5)*52,y+(Math.random()-.5)*52,1.6);});});
  </script>
</body>
</html>
